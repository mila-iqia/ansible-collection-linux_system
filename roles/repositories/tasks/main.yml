---
- name: Exclude Ubuntu >=24 version
  when: not (ansible_distribution == "Ubuntu" and ansible_distribution_major_version | int >= 24)
  block:
    - name: Configure APT repositories
      ansible.builtin.include_tasks:
        file: "repositories-apt.yml"
      loop: "{{ repositories_apt }}"

    - name: Remove default APT sources
      when:
        - ansible_facts['os_family'] == "Debian"
        - repositories_remove_apt_sources | bool
      notify: Update repository cache
      ansible.builtin.file:
        path: '{{ item.path }}'
        state: absent
      loop:
        - { path: /etc/apt/sources.list}
        - { path: /etc/apt/sources.list.d/debian.sources }

- name: Configure APT priority
  when: item.apt_pin_priority is defined
  ansible.builtin.include_tasks:
    file: "priority-apt.yml"
  loop: "{{ priority_apt }}"

- name: Run handlers to update the reposiory cache
  ansible.builtin.meta: flush_handlers
